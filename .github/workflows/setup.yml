name: GitHub Source Sync

on:
  workflow_dispatch:
    inputs:
      repository_url:
        description: 'GitHub repository URL'
        required: true
      branch_or_tag:
        description: 'Branch or tag to sync'
        required: false
        default: ''

jobs:
  sync-source:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone target repository
        run: |
          REPO_URL="${{ inputs.repository_url }}"
          REF="${{ inputs.branch_or_tag }}"
          if [ -n "$REF" ]; then
            git clone --depth 1 --branch "$REF" "$REPO_URL" temp_source
          else
            git clone --depth 1 "$REPO_URL" temp_source
          fi
      - name: Merge files
        run: |
          rm -rf temp_source/.git
          rm -rf temp_source/.github
          shopt -s dotglob
          cp -a temp_source/* ./
          shopt -u dotglob
          rm -rf temp_source
      - name: Commit & push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          git reset .github
          
          git commit -m "Synced source from ${{ inputs.repository_url }}" || echo "No changes"
          git push
