name: Build HXCPP from Source

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-hxcpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.4

      - run: haxelib setup ~/haxelib

      - name: Build HXCPP Tools
        run: |
          cd tools/run
          haxe compile.hxml
          cd ../hxcpp
          haxe compile.hxml

      - name: Register HXCPP as dev lib
        run: |
          cd $GITHUB_WORKSPACE
          haxelib dev hxcpp "$GITHUB_WORKSPACE"

      - name: Build HXCPP Cppia Host
        run: |
          cd project
          haxe compile-cppia.hxml

      - name: List files
        run: ls -R tools/hxcpp

      - name: Upload HXCPP Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hxcpp-built
          path: |
            tools/hxcpp
            tools/run
            project
