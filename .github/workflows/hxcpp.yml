name: Build HXCPP from source

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-hxcpp:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git unzip curl build-essential neko

      - name: Install Haxe
        run: |
          curl -fsSL https://haxe.org/website-content/downloads/4.3.2/downloads/haxe-4.3.2-linux64.tar.gz | tar -xz -C $HOME
          export PATH="$HOME/haxe-4.3.2:$PATH"
          haxe --version

      - name: Clone hxcpp source
        run: |
          mkdir -p $HOME/haxelib
          cd $HOME/haxelib
          git clone https://github.com/HaxeFoundation/hxcpp.git
          cd hxcpp
          git checkout master

      - name: Build hxcpp tools
        run: |
          cd $HOME/haxelib/hxcpp/tools/hxcpp
          $HOME/haxe-4.3.2/haxe compile.hxml

      - name: Set hxcpp as dev version
        run: |
          cd $HOME/haxelib/hxcpp
          $HOME/haxe-4.3.2/haxelib dev hxcpp $HOME/haxelib/hxcpp

      - name: Verify hxcpp
        run: $HOME/haxe-4.3.2/haxelib list
