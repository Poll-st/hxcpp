name: Build HXCPP from Source

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-hxcpp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Haxe 4.3.4
        uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.4

      - name: Setup Haxelib
        run: haxelib setup ~/haxelib

      - name: Build HXCPP Tools
        run: |
          REPO=$(pwd)
          cd "$REPO/tools/run"
          haxe compile.hxml
          cd "$REPO/tools/hxcpp"
          haxe compile.hxml
          cd "$REPO/project"
          haxe compile-cppia.hxml
          cd "$REPO"

      - name: Register HXCPP with Haxelib
        run: |
          REPO=$(pwd)
          haxelib dev hxcpp "$REPO"

      - name: Verify HXCPP Installation
        run: |
          haxelib list | grep hxcpp
