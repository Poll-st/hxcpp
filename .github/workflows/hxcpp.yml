name: Build HXCPP from Source

on:
  workflow_dispatch:

jobs:
  build-hxcpp:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout HXCPP Source
        uses: actions/checkout@v3
        with:
          repository: Poll-st/hxcpp
          path: hxcpp-source

      - name: Setup Haxe
        uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.4

      - name: Setup Haxelib
        run: haxelib setup ~/haxelib

      - name: Build HXCPP
        run: |
          cd hxcpp-source/tools/hxcpp
          haxe compile.hxml

      - name: Register HXCPP as Dev Library
        run: haxelib dev hxcpp hxcpp-source

      - name: Upload HXCPP Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hxcpp-built
          path: hxcpp-source
