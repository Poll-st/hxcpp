name: Build HXCPP from Source

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-hxcpp:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y curl git neko build-essential

    - name: Install Haxe 4.3.2
      run: |
        curl -fsSL https://haxe.org/website-content/downloads/4.3.2/downloads/haxe-4.3.2-linux64.tar.gz | tar -xz -C $HOME
        echo "$HOME/haxe-4.3.2:$HOME/haxe-4.3.2/bin" >> $GITHUB_PATH

    - name: Verify Haxe
      run: haxe --version

    - name: Install hxcpp from Git
      run: |
        mkdir -p $HOME/haxelib
        haxelib git hxcpp https://github.com/HaxeFoundation/hxcpp.git
        cd $HOME/haxelib/hxcpp/git/tools/hxcpp
        haxe compile.hxml
        cd $HOME
        haxelib dev hxcpp $HOME/haxelib/hxcpp/git

    - name: Verify hxcpp
      run: haxelib list | grep hxcpp
